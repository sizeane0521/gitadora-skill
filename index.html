    <script>
      // GitHub Pages SPA redirect: restore path from query string
      (function (l) {
        if (l.search[1] === 'p') {
          var params = l.search.slice(1).split('&').reduce(function (p, s) {
            var r = s.split('='); p[r[0]] = r.slice(1).join('=').replace(/~and~/g, '&'); return p;
          }, {});
          if (params.p !== undefined) {
            window.history.replaceState(
              null, null,
              l.pathname.replace(/\/$/, '') + (params.p || '') + (params.q ? '?' + params.q : '') + l.hash
            );
          }
        }
      }(window.location));
    </script>

  <body>
    <div id="root">
      <!-- Branded splash screen – removed by React on mount -->
      <div id="splash" style="position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#0a0a0e;z-index:9999;">
        <style>
          @import url('https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@700&display=swap');
          @keyframes splash-pulse{0%,100%{opacity:.4;transform:scale(.96)}50%{opacity:1;transform:scale(1)}}
          @keyframes splash-dot{0%,80%,100%{opacity:.2}40%{opacity:1}}
          #splash-title{font-family:'Chakra Petch',sans-serif;font-size:28px;font-weight:700;color:#00d4ff;letter-spacing:2px;animation:splash-pulse 2s ease-in-out infinite}
          #splash-sub{font-family:'Chakra Petch',sans-serif;font-size:13px;color:#6b7280;margin-top:12px;letter-spacing:1px}
          .splash-dots span{display:inline-block;animation:splash-dot 1.4s infinite;margin:0 2px}
          .splash-dots span:nth-child(2){animation-delay:.2s}
          .splash-dots span:nth-child(3){animation-delay:.4s}
        </style>
        <div id="splash-title">SIZ Skill</div>
        <div id="splash-sub">Loading<span class="splash-dots"><span>.</span><span>.</span><span>.</span></span></div>
      </div>
    </div>
